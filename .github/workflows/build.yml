name: Build plugin jar

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Unzip project
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          unzip -o DeleteOddPickupProject.zip -d project

      - name: Build
        working-directory: project
        run: |
          chmod +x ./gradlew
          ./gradlew build

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: DeleteOddPickup-jar
          path: project/build/libs/*.jar
